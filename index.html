<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <div class="envelope-container">

            <img
                src="amplop1.PNG"
                id="envelope"
                class="envelope"
                alt="amplop"
            >

            <!-- Area klik seal -->
            <div id="seal"></div>

            <div id="typedMessage" class="typed-message"></div>

        </div>

        <div id="letterText" class="letter-text">

            <h2>Happy Birthday ❤️</h2>

            <p>
                Hari ini adalah hari yang spesial,
                dan kamu adalah alasan mengapa hari ini terasa lebih indah.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
